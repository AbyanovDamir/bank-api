services:
  postgres:
    image: postgres:17
    container_name: bank-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bankdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bank-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    container_name: bank-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - bank-network
    restart: unless-stopped

  app:
    build: .
    container_name: bank-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: bankdb
      DB_SSL_MODE: disable
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      LOG_LEVEL: info
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    networks:
      - bank-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bank-network:
    driver: bridge
